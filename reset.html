  <h2>Neues Passwort setzen</h2>
  <div id="formDiv">
    <label>Neues Passwort</label>
    <input type="password" id="pw1" placeholder="Mindestens 8 Zeichen">
    <label>Passwort wiederholen</label>
    <input type="password" id="pw2" placeholder="Passwort wiederholen">
    <button class="btn" onclick="doReset()">Passwort speichern</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script>
var token = new URLSearchParams(window.location.search).get('token');
if(!token) { document.getElementById('formDiv').innerHTML = '<p style="color:#e05252;text-align:center;">Ungültiger Link.</p>'; }

async function doReset(){
  var pw1=document.getElementById('pw1').value;
  var pw2=document.getElementById('pw2').value;
  var msg=document.getElementById('msg');
  if(!pw1||pw1.length<8){msg.style.color='#e05252';msg.textContent='Passwort muss mindestens 8 Zeichen haben.';return;}
  if(pw1!==pw2){msg.style.color='#e05252';msg.textContent='Passwörter stimmen nicht überein.';return;}
  msg.style.color='#8a7d6a';msg.textContent='Speichern...';
  var r=await fetch('/api/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token,password:pw1})});
  var d=await r.json();
  if(d.ok){
    msg.style.color='#c4a882';msg.textContent='Passwort geändert! Du wirst weitergeleitet...';
    setTimeout(function(){window.location.href='/';'},2000);
  } else {
    msg.style.color='#e05252';msg.textContent=d.error||'Fehler – Link abgelaufen?';
  }
}
</script>
